name: python ci
on:
    push:
        branches:
            - 'main'
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v6
            - name: set up python
              id: set-python
              uses: actions/setup-python@v6
              with:
                python-version: '3.13'
            - name: install dependencies
              run:
                python -m pip install --upgrade pip pip install -r requirements.txt
    test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: checkout code
              uses: actions/checkout@v6
            - name: set up python
              id: set-python
              uses: actions/setup-python@v6
              with:
                python-version: '3.13'
            - name: install dependencies
              run:
                python -m pip install --upgrade pip
                pip install -r requirements.txt
            - name: Run tests
              run: pytest
