name: "Multievent pipeline workflows" # name of the pipeline

on:
    push: # event- when a push is made to the repository on main branch
        branches:
            - main
            - test
    pull_request: # whenever a pull request is made to the repository
            branches:
                  - main

jobs:
    on-push: # job 1 name
        if: github.event_name=='push'
        runs-on: ubuntu-latest
        steps: # steps to be executed in the jobs
            - name: "running on main push" # step 1
              run: "echo running on main push"

    on-pull-request: # job 2 name
        if: github.event_name== 'pull request'
        runs-on: ubuntu-latest
        steps:
            - name: "running on pull request"
              run: "echo running on pull request"
              