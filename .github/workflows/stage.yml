name: pipeline with stages

on:
    push:
        branches:
            - 'test'

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v6
            - name: build project
              run: echo "building the project"
    test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: checkout code
              uses: actions/checkout@v6
            - name: test project
              run: echo "running test..."
    deploy:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: checkout code
              uses: actions/checkout@v6
            - name: test project
              run: echo "deploying the project..."