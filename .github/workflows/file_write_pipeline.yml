name: python file writer ci
on:
    push:
        branches: ["master"]
    pull_request:
        branches: ["master"]
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v6

            - name: set up python
              uses: actions/setup-python@v6
              with:
                python-version: '3.13'

            - name: install dependencies
              run: pip install pytest

            - name: run test cases
              run: pytest
    